# version: "3.8"

services:
  graphdb:
    image: ontotext/graphdb:11.1.1
    container_name: my-graphdb
    ports:
      - "7200:7200"
    volumes:
      - graphdb_data:/opt/graphdb/home
      - ./graphdb_lib_jdbc:/opt/graphdb/dist/lib/jdbc
    environment:
      - GDB_JAVA_OPTS=-Xmx4g
    networks:
      - ait-network

  postgres:
    image: postgres:latest
    container_name: my-postgres
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # environment:
    #   - POSTGRES_DB=
    #   - POSTGRES_USER=
    #   - POSTGRES_PASSWORD=
    networks:
      - ait-network

networks:
  ait-network:
    driver: bridge

volumes:
  postgres_data:
  graphdb_data:
