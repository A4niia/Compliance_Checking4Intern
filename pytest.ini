[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
markers =
    shacl: SHACL shape validation tests
    prefilter: Pre-filter unit tests
    syntactic: Syntactic validation tests
    semantic: Semantic validation tests
    permission: Permission-specific tests
    obligation: Obligation-specific tests
    prohibition: Prohibition-specific tests
    coverage: Coverage metric tests
    slow: Tests that require LLM connection
